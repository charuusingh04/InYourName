<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Why I Love You - Prescriptions</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💙</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="reasons">
    <!-- Navigation -->
    <nav>
        <div class="nav-brand">💙 Dr. Charu's Heart Clinic</div>
        <div style="display: flex; align-items: center; gap: 1rem;">
            <a href="memories.html" style="text-decoration: none; color: #4A9B9E; font-weight: 500;">← Back</a>
            <button class="music-toggle" title="Toggle Music">🔇</button>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="page-container">
        <div class="content-wrapper">
            <header>
                <h1>Why I Love You</h1>
                <p class="subtitle">Prescriptions From My Heart</p>
            </header>

            <p style="margin-bottom: 3rem; color: #666;">
                Each reason is a dose of truth that's healed me in ways you'll never know.
            </p>

            <!-- Prescription Cards -->
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; margin: 3rem 0;" id="reasons-grid">
                <!-- Cards will be generated by JavaScript -->
            </div>

            <!-- Call to action -->
            <div style="margin-top: 3rem;">
                <button class="btn" onclick="navigateTo('future.html')" style="font-size: 1.1rem; padding: 1.2rem 2rem;">
                    Our Future →
                </button>
            </div>
        </div>
    </div>

    <!-- Audio Element -->
    <audio id="background-music" loop style="display: none;"></audio>

    <!-- Scripts -->
    <script src="script.js"></script>
    <script>
        const reasons = [
            'Your smile has the power to heal my worst days. A single smile from you can chase away all my darkness.',
            'Your voice calms every chaos in my mind. Hearing you speak is like a balm on a wound I didn\'t know was bleeding.',
            'Your presence feels like home. With you, I finally understand what it means to belong somewhere, to someone.',
            'You are the calm my heart always searched for. Before you, I was constantly restless. Now, in your presence, I\'m finally at peace.',
            'Your kindness reminds me to be better. You inspire me not just to love you, but to become worthy of your love.',
            'Your laughter is music my soul has been waiting for since birth. It completes me in ways I never thought possible.'
        ];

        let unlockedReasons = 0;

        function initializeReasonsPage() {
            const grid = document.getElementById('reasons-grid');
            if (!grid) return;

            grid.innerHTML = '';

            reasons.forEach((reason, index) => {
                const card = document.createElement('div');
                card.className = `prescription-card slide-in-up stagger-${Math.min(index + 1, 6)}`;
                card.style.cursor = 'pointer';
                card.style.transition = 'all 0.3s ease';
                
                const isUnlocked = index === 0;

                card.innerHTML = `
                    <h4>Prescription ${String(index + 1).padStart(2, '0')}</h4>
                    <p style="opacity: ${isUnlocked ? '1' : '0.4'};">${isUnlocked ? reason : '🔒 Click to unlock'}</p>
                `;

                if (!isUnlocked) {
                    card.style.opacity = '0.6';
                }

                card.addEventListener('click', function() {
                    if (index !== 0 && this.querySelector('p').textContent.includes('🔒')) {
                        const p = this.querySelector('p');
                        p.textContent = reason;
                        p.style.opacity = '1';
                        this.style.opacity = '1';
                        unlockedReasons++;
                        Animations.vibrate([100, 50, 100]);

                        if (unlockedReasons === reasons.length - 1) {
                            setTimeout(() => showCelebration(), 500);
                        }
                    } else if (index === 0) {
                        Animations.vibrate([50, 30, 50]);
                    }
                });

                grid.appendChild(card);
            });
        }

        function showCelebration() {
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed; top: 0; left: 0; right: 0; bottom: 0;
                background: rgba(0,0,0,0.7); display: flex;
                align-items: center; justify-content: center;
                z-index: 9999; animation: fadeIn 0.3s ease;
            `;
            
            modal.innerHTML = `
                <div style="background: white; padding: 3rem; border-radius: 15px; text-align: center; max-width: 400px; animation: scaleIn 0.5s ease;">
                    <div style="font-size: 3rem; margin-bottom: 1rem;">✨💖✨</div>
                    <h2 style="color: #FF99C5; margin-bottom: 1rem;">You've unlocked my heart!</h2>
                    <p style="color: #666; margin-bottom: 2rem;">These are all the reasons why you complete me.</p>
                    <button onclick="this.parentElement.parentElement.remove()" class="btn" style="font-size: 1rem; padding: 0.8rem 2rem;">
                        Continue →
                    </button>
                </div>
            `;

            document.body.appendChild(modal);
            Animations.createConfetti(modal);
        }

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', initializeReasonsPage);
    </script>
</body>
</html>
